---
- name: Restart Kubernetes Deployment
  hosts: localhost
  connection: local
  vars:
    deployment_name: "my-web"
    namespace: "default"

  tasks:
    - name: Trigger rollout restart by patching annotation
      kubernetes.core.k8s:
        kubeconfig: "{{ lookup('env','K8S_AUTH_KUBECONFIG') }}"
        state: patched
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        definition:
          spec:
            template:
              metadata:
                annotations:
                  # This timestamp change triggers the rollout
                  kubectl.kubernetes.io/restartedAt: "{{ now(fmt='%Y-%m-%dT%H:%M:%SZ') }}"
